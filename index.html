<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Histogram Czasów Realizacji (Dni)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      color: #f0f6fc;
    }
    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 28px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 18px 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .card-icon { font-size: 1.7rem; line-height: 1; }
    .card-title { font-size: 1rem; font-weight: 600; }
    .card-count {
      margin-left: auto;
      background: #21262d;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.75rem;
      color: #8b949e;
    }
    .percentiles { display: flex; gap: 8px; }
    .pct-badge {
      flex: 1;
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
      border: 1px solid transparent;
    }
    .pct-badge .label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .pct-badge .value { font-size: 1.2rem; font-weight: 700; }
    .pct-badge .unit  { font-size: 0.7rem; opacity: 0.6; margin-left: 2px; }
    .size-s .card-title { color: #39d353; }
    .size-s .pct-badge  { background: #12261e; border-color: #39d35344; }
    .size-s .pct-badge .value { color: #39d353; }
    .size-m .card-title { color: #58a6ff; }
    .size-m .pct-badge  { background: #0d1d35; border-color: #58a6ff44; }
    .size-m .pct-badge .value { color: #58a6ff; }
    .size-l .card-title { color: #f78166; }
    .size-l .pct-badge  { background: #2a1010; border-color: #f7816644; }
    .size-l .pct-badge .value { color: #f78166; }
    .chart-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px 16px;
    }
    .chart-container canvas { max-height: 420px; }
    .chart-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #c9d1d9;
      margin-bottom: 14px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-top: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #c9d1d9;
    }
    .legend-dot  { width:12px; height:12px; border-radius:3px; }
    .legend-dash { width:22px; height:2px; border-top:2px dashed; }
    .form-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 18px 24px;
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 16px;
    }
    .form-container legend {
      font-size: 0.95rem;
      font-weight: 600;
      color: #c9d1d9;
      margin-bottom: 12px;
      width: 100%;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .form-group label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #8b949e;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .form-group input, .form-group select {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 7px;
      color: #e6edf3;
      font-size: 0.92rem;
      padding: 7px 12px;
      outline: none;
      min-width: 120px;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #58a6ff;
    }
    .form-group select option { background: #161b22; }
    .btn-add {
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 7px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.15s;
      align-self: flex-end;
    }
    .btn-add:hover { background: #2ea043; }
    .form-msg {
      font-size: 0.8rem;
      padding: 5px 10px;
      border-radius: 6px;
      display: none;
      align-self: flex-end;
    }
    .form-msg.ok  { display:block; background:#12261e; color:#39d353; border:1px solid #39d35344; }
    .form-msg.err { display:block; background:#2a1010; color:#f78166; border:1px solid #f7816644; }
    .btn-toggle {
      margin-left: auto;
      background: none;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 3px 11px;
      font-size: 0.73rem;
      color: #8b949e;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      line-height: 1.4;
    }
    .btn-toggle:hover { background: #21262d; color: #c9d1d9; }
    .card.hidden-category { opacity: 0.38; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000bb;
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 24px 28px;
      min-width: 320px;
      max-width: 480px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 4px;
    }
    .modal-subtitle {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 16px;
    }
    .modal-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .modal-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #21262d;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.88rem;
      color: #c9d1d9;
    }
    .modal-item-info { display: flex; align-items: center; gap: 8px; }
    .modal-item-idx {
      font-size: 0.7rem;
      color: #8b949e;
      min-width: 24px;
    }
    .btn-delete {
      background: #3d1a1a;
      border: 1px solid #f7816644;
      border-radius: 6px;
      color: #f78166;
      font-size: 0.8rem;
      padding: 4px 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-delete:hover { background: #5a2020; }
    .modal-empty {
      text-align: center;
      color: #8b949e;
      font-size: 0.85rem;
      padding: 16px 0;
    }
    .modal-close {
      margin-top: 16px;
      width: 100%;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 7px;
      color: #c9d1d9;
      font-size: 0.9rem;
      padding: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .modal-close:hover { background: #30363d; }
    .chart-hint {
      font-size: 0.75rem;
      color: #8b949e;
      text-align: right;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<h1>📊 Histogram Czasów Realizacji</h1>
<p class="subtitle">Analiza czasów realizacji według rozmiaru zamówienia</p>

<div class="form-container">
  <legend>➕ Dodaj nowy wpis</legend>
  <div class="form-group">
    <label for="inp-size">Rozmiar</label>
    <select id="inp-size">
      <option value="S">S – Small</option>
      <option value="M">M – Medium</option>
      <option value="L">L – Large</option>
    </select>
  </div>
  <div class="form-group">
    <label for="inp-time">Czas realizacji (dni)</label>
    <input id="inp-time" type="number" min="0" step="0.1" placeholder="np. 3.5" />
  </div>
  <button class="btn-add" id="btn-add">Dodaj</button>
  <span class="form-msg" id="form-msg"></span>
</div>

<div class="cards-grid" id="cards"></div>

<div class="chart-container">
  <div class="chart-title">Rozkład czasów realizacji (dni) — podział na rozmiar</div>
  <canvas id="histChart"></canvas>
  <div class="legend" id="legend"></div>
  <div class="chart-hint">💡 Kliknij na słupek, aby zobaczyć wpisy i usunąć wybrany</div>
</div>

<!-- Modal – delete entry -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <ul class="modal-list" id="modal-list"></ul>
    <div class="modal-empty" id="modal-empty" style="display:none">Brak wpisów w tym przedziale.</div>
    <button class="modal-close" id="modal-close">Zamknij</button>
  </div>
</div>

<script>
let RAW = [
  {size:'S',time:49},{size:'S',time:48},{size:'S',time:87},
  {size:'M',time:57},{size:'M',time:148},{size:'S',time:53},
  {size:'S',time:45},{size:'M',time:145},{size:'L',time:105},
  {size:'S',time:5},{size:'L',time:163},{size:'S',time:43},
  {size:'M',time:415},{size:'L',time:123},{size:'M',time:103},
  {size:'L',time:104},{size:'L',time:302},{size:'L',time:158},
  {size:'L',time:98},{size:'S',time:52},{size:'M',time:95},
  {size:'S',time:70},{size:'M',time:95},{size:'M',time:101},
  {size:'M',time:57},{size:'M',time:57},{size:'S',time:53},
  {size:'L',time:137},{size:'S',time:73},{size:'M',time:60},
  {size:'S',time:126},{size:'M',time:57},{size:'L',time:124},
  {size:'M',time:75},{size:'M',time:89},{size:'S',time:44},
];

const SIZES = {
  S:{ label:'S \u2013 Small',  icon:'\u26A1', color:'#39d353', bgAlpha:'55' },
  M:{ label:'M \u2013 Medium', icon:'\uD83D\uDCE6', color:'#58a6ff', bgAlpha:'55' },
  L:{ label:'L \u2013 Large',  icon:'\uD83C\uDFD7\uFE0F', color:'#f78166', bgAlpha:'55' },
};

const hiddenSizes = new Set();

function pct(arr, p) {
  const s = [...arr].sort((a,b)=>a-b);
  const idx = p/100*(s.length-1);
  const lo=Math.floor(idx), hi=Math.ceil(idx);
  return parseFloat((s[lo]+(idx-lo)*(s[hi]-s[lo])).toFixed(1));
}

let chartInstance = null;
let currentBins = [];

function renderAll() {
  const grouped = {};
  RAW.forEach(({size,time})=>{ if(!grouped[size]) grouped[size]=[]; grouped[size].push(time); });
  ['S','M','L'].forEach(s=>{ if(!grouped[s]) grouped[s]=[]; });

  const stats = {};
  Object.entries(grouped).forEach(([s,times])=>{
    stats[s]={ times, count:times.length,
      p50: times.length ? pct(times,50) : 0,
      p85: times.length ? pct(times,85) : 0,
      p95: times.length ? pct(times,95) : 0,
    };
  });

  const allTimes = RAW.map(r=>r.time);
  const BIN_WIDTH = 50;
  const maxTime = allTimes.length ? Math.max(...allTimes) : 450;
  const MAX_TIME = Math.ceil((maxTime + BIN_WIDTH) / BIN_WIDTH) * BIN_WIDTH;
  const bins = [];
  for(let lo=0; lo<MAX_TIME; lo+=BIN_WIDTH)
    bins.push({lo, hi:lo+BIN_WIDTH, label:`${lo}\u2013${lo+BIN_WIDTH}`});
  currentBins = bins;

  function countBin(times,lo,hi){ return times.filter(t=>t>=lo&&t<hi).length; }

  // Stat cards
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  ['S','M','L'].forEach(s=>{
    const cfg=SIZES[s], st=stats[s], cls=`size-${s.toLowerCase()}`;
    const isHidden = hiddenSizes.has(s);
    const toggleLabel = isHidden ? '👁 Pokaż' : '🙈 Ukryj';
    const cardDiv = document.createElement('div');
    cardDiv.className = `card ${cls}${isHidden ? ' hidden-category' : ''}`;
    cardDiv.innerHTML = `
      <div class="card-header">
        <span class="card-icon">${cfg.icon}</span>
        <span class="card-title">${cfg.label}</span>
        <span class="card-count">${st.count} zam&oacute;wie&#324;</span>
        <button class="btn-toggle" data-size="${s}" title="${isHidden ? 'Pokaż kategorię na wykresie' : 'Ukryj kategorię na wykresie'}">${toggleLabel}</button>
      </div>
      <div class="percentiles">
        <div class="pct-badge"><div class="label">P50</div><div class="value">${st.p50}<span class="unit">dni</span></div></div>
        <div class="pct-badge"><div class="label">P85</div><div class="value">${st.p85}<span class="unit">dni</span></div></div>
        <div class="pct-badge"><div class="label">P95</div><div class="value">${st.p95}<span class="unit">dni</span></div></div>
      </div>`;
    cardsEl.appendChild(cardDiv);
    cardDiv.querySelector('.btn-toggle').addEventListener('click', ()=>{
      if(hiddenSizes.has(s)) hiddenSizes.delete(s);
      else hiddenSizes.add(s);
      renderAll();
    });
  });

  // Chart datasets – skip hidden sizes
  const datasets = ['S','M','L'].map(s=>({
    label: SIZES[s].label,
    sizeKey: s,
    data: bins.map(b=>countBin(grouped[s],b.lo,b.hi)),
    backgroundColor: hiddenSizes.has(s) ? 'transparent' : SIZES[s].color+SIZES[s].bgAlpha,
    borderColor: hiddenSizes.has(s) ? 'transparent' : SIZES[s].color,
    borderWidth:2, borderRadius:4,
    hidden: hiddenSizes.has(s),
  }));

  // Percentile annotations
  function binIndexOf(m){ return bins.findIndex(b=>m>=b.lo&&m<b.hi); }
  const yOffsets={S_p50:-18,S_p85:-36,S_p95:-54,M_p50:0,M_p85:18,M_p95:36,L_p50:18,L_p85:36,L_p95:54};
  const dashMap={p50:[6,3],p85:[4,4],p95:[2,3]};
  const annotations={};
  ['S','M','L'].forEach(s=>{
    if(hiddenSizes.has(s)) return;
    const color=SIZES[s].color, st=stats[s];
    if(!st.count) return;
    [['p50',st.p50],['p85',st.p85],['p95',st.p95]].forEach(([key,val])=>{
      annotations[`${s}_${key}`]={
        type:'line', scaleID:'x', value:binIndexOf(val),
        borderColor:color, borderWidth:1.5, borderDash:dashMap[key],
        label:{
          display:true, content:`${s} ${key.toUpperCase()} ${val} dni`,
          position:'start', backgroundColor:'#0d1117cc', color,
          font:{size:10,weight:'600'}, padding:{x:5,y:3},
          yAdjust:yOffsets[`${s}_${key}`]??0,
        },
      };
    });
  });

  if (chartInstance) { chartInstance.destroy(); }

  const ctx = document.getElementById('histChart').getContext('2d');
  chartInstance = new Chart(ctx,{
    type:'bar',
    data:{ labels:bins.map(b=>b.label), datasets },
    options:{
      responsive:true,
      interaction:{mode:'index',intersect:false},
      onClick(event, elements) {
        if (!elements.length) return;
        const el = elements[0];
        const dataset = chartInstance.data.datasets[el.datasetIndex];
        const sizeKey = dataset.sizeKey;
        const bin = currentBins[el.index];
        if (!bin || !sizeKey) return;
        openDeleteModal(sizeKey, bin);
      },
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1c2128', borderColor:'#30363d', borderWidth:1,
          titleColor:'#c9d1d9', bodyColor:'#8b949e',
          callbacks:{
            title:items=>`\u23F1 ${items[0].label} (dni)`,
            label:item=>` ${SIZES[['S','M','L'][item.datasetIndex]].icon} ${item.dataset.label}: ${item.raw} zam.`,
          },
        },
        annotation:{annotations},
      },
      scales:{
        x:{
          stacked:true, grid:{color:'#21262d'},
          ticks:{color:'#8b949e',font:{size:11}},
          title:{display:true,text:'Czas realizacji (dni)',color:'#8b949e',font:{size:12}},
        },
        y:{
          stacked:true, beginAtZero:true, grid:{color:'#21262d'},
          ticks:{color:'#8b949e',font:{size:11},stepSize:1},
          title:{display:true,text:'Liczba zam\u00F3wie\u0144',color:'#8b949e',font:{size:12}},
        },
      },
    },
  });

  // Legend
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';
  ['S','M','L'].forEach(s=>{
    const dimmed = hiddenSizes.has(s) ? 'opacity:0.35;' : '';
    legendEl.innerHTML+=`<span class="legend-item" style="${dimmed}"><span class="legend-dot" style="background:${SIZES[s].color}88;border:2px solid ${SIZES[s].color}"></span>${SIZES[s].icon} ${SIZES[s].label}</span>`;
  });
  legendEl.innerHTML+=`<span class="legend-item"><span class="legend-dash" style="border-color:#ffffff55"></span>&nbsp;Linia percentyla (P50/P85/P95)</span>`;
}

// --- Delete modal ---
function openDeleteModal(sizeKey, bin) {
  const cfg = SIZES[sizeKey];

  function getMatchingEntries() {
    const result = [];
    RAW.forEach((entry, idx)=>{
      if(entry.size === sizeKey && entry.time >= bin.lo && entry.time < bin.hi)
        result.push({ idx, time: entry.time });
    });
    return result;
  }

  function refreshList() {
    const matches = getMatchingEntries();
    document.getElementById('modal-subtitle').textContent =
      `Znaleziono ${matches.length} wpis${matches.length === 1 ? '' : matches.length >= 2 && matches.length <= 4 ? 'y' : 'ów'}. Kliknij „Usuń", aby usunąć wybrany wpis.`;

    const listEl = document.getElementById('modal-list');
    const emptyEl = document.getElementById('modal-empty');
    listEl.innerHTML = '';

    if (!matches.length) {
      emptyEl.style.display = '';
    } else {
      emptyEl.style.display = 'none';
      matches.forEach(({time}, i)=>{
        const li = document.createElement('li');
        li.className = 'modal-item';
        li.innerHTML = `
          <div class="modal-item-info">
            <span class="modal-item-idx">#${i+1}</span>
            <span>${time} dni</span>
          </div>
          <button class="btn-delete">🗑 Usuń</button>`;
        li.querySelector('.btn-delete').addEventListener('click', ()=>{
          const currentIdx = RAW.findIndex(e => e.size === sizeKey && e.time === time);
          if (currentIdx !== -1) RAW.splice(currentIdx, 1);
          closeModal();
          renderAll();
        });
        listEl.appendChild(li);
      });
    }
  }

  document.getElementById('modal-title').textContent =
    `${cfg.icon} ${cfg.label} — przedział ${bin.label} dni`;
  refreshList();
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// Initial render
renderAll();

// Form handling
document.getElementById('btn-add').addEventListener('click', ()=>{
  const sizeVal = document.getElementById('inp-size').value;
  const timeRaw = document.getElementById('inp-time').value.trim();
  const msgEl   = document.getElementById('form-msg');

  msgEl.className = 'form-msg';
  msgEl.textContent = '';

  const timeNum = parseFloat(timeRaw);
  if (!timeRaw || isNaN(timeNum) || timeNum < 0) {
    msgEl.className = 'form-msg err';
    msgEl.textContent = 'Podaj prawidłową liczbę dni (≥ 0).';
    return;
  }

  RAW.push({ size: sizeVal, time: timeNum });
  renderAll();

  document.getElementById('inp-time').value = '';
  msgEl.className = 'form-msg ok';
  msgEl.textContent = `Dodano: ${SIZES[sizeVal].label}, ${timeNum} dni.`;
  setTimeout(()=>{ msgEl.className='form-msg'; }, 3000);
});
</script>
</body>
</html>
